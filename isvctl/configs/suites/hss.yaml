# High-Speed Storage (HSS) Validation - Canonical Contract
#
# Validations-only contract for high-speed storage (SDS controller + parallel
# file system services). Provider configs import this file and supply their own
# commands (steps + scripts).
#
# This file defines WHAT to validate, not HOW to run it. Each validation only
# inspects JSON output fields. As long as your scripts output the right fields,
# the validations pass regardless of which storage vendor/NCP you use.
#
# Quick start:
#   1. Copy providers/my-isv/config/storage.yaml to providers/<your-platform>/config/storage.yaml
#   2. Replace stub paths with your platform scripts
#   3. Run: uv run isvctl test run -f isvctl/configs/providers/<your-platform>/config/storage.yaml
#
# See also:
#   - my-isv living example: providers/my-isv/config/storage.yaml
#   - Per-step field breakdown: ../suites/README.md

version: "1.0"

tests:
  cluster_name: "hss-validation"
  description: "High-speed storage validation tests"
  platform: storage

  settings:
    # Provider-specific - override in your provider config
    region: ""

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    # SDS Controller: provisioning, QoS, upgrades, RDMA memory protection.
    hss_sds_controller:
      checks:
        HssStorageProvisioningCheck:
          test_id: "HSS01-01"
          labels: ["min_req"]
          step: provision_storage
        HssQosThroughputCheck:
          test_id: "HSS02-01"
          labels: ["min_req"]
          step: qos_throughput
        HssNonDisruptiveUpgradeCheck:
          test_id: "HSS05-01"
          labels: ["min_req"]
          step: non_disruptive_upgrade
        HssRdmaMemoryProtectionCheck:
          test_id: "HSS06-01"
          labels: ["min_req"]
          step: rdma_memory_protection

    # Parallel File System Services: provisioning, capacity, expansion, quotas,
    # root-squash, flock, changelog/audit, multipathing.
    hss_parallel_fs:
      checks:
        HssParallelFsProvisioningCheck:
          test_id: "HSS07-01"
          labels: ["min_req"]
          step: provision_parallel_fs
        HssMultipleFilesystemsCheck:
          test_id: "HSS09-01"
          labels: ["min_req"]
          step: multiple_filesystems
        HssLiveExpansionCheck:
          test_id: "HSS10-01"
          labels: ["min_req"]
          step: live_expansion
        HssQuotaEnforcementCheck:
          test_id: "HSS12-01"
          labels: ["min_req"]
          step: quota_enforcement
        HssRootSquashCheck:
          test_id: "HSS13-01"
          labels: ["min_req"]
          step: root_squash
        HssFlockMountCheck:
          test_id: "HSS14-01"
          labels: ["min_req"]
          step: flock_mount
        HssChangelogAuditCheck:
          test_id: "HSS15-01"
          labels: ["min_req"]
          step: changelog_audit
        HssMultipathCheck:
          test_id: "HSS18-01"
          labels: ["min_req"]
          step: multipath
