# Observability Validation - Canonical Contract
#
# Provider configs import this file and provide their own scripts for each
# step. Validations consume only provider-neutral JSON fields.

version: "1.0"

tests:
  module: observability
  cluster_name: "observability-validation"
  description: "Observability collector validation tests"

  settings:
    region: ""
    network_id: ""
    # The OBS05 NSRG target is 120s, but major provider metric pipelines do
    # not surface queryable datapoints that fast; 600s is the portable budget
    # that still flags a stalled telemetry pipeline. Providers that can meet
    # a tighter bound may override this in their settings.
    max_delivery_seconds: 600

  validations:
    telemetry_delivery:
      checks:
        TelemetryDeliveryLatencyCheck:
          test_id: "OBS05-01"
          labels: ["min_req", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: telemetry_delivery_latency
          max_delivery_seconds: "{{max_delivery_seconds}}"

    network_telemetry:
      checks:
        NorthSouthNetworkTelemetryCheck:
          test_id: "OBS06-01"
          labels: ["min_req", "network", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: north_south_network_telemetry
        EastWestNetworkTelemetryCheck:
          test_id: "OBS07-01"
          labels: ["min_req", "network", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: east_west_network_telemetry
        ManagementNetworkTelemetryCheck:
          test_id: "OBS08-01"
          labels: ["min_req", "network", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: management_network_telemetry
        NvswitchFabricTelemetryCheck:
          test_id: "OBS09-01"
          labels: ["min_req", "network", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: nvswitch_fabric_telemetry
        HostNicNetworkTelemetryCheck:
          test_id: "OBS10-01"
          labels: ["min_req", "network", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: host_nic_network_telemetry

    network_logs:
      checks:
        VpcFlowLogsCheck:
          test_id: "OBS19-01"
          labels: ["min_req", "network", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: vpc_flow_logs

    # Host syslog + BMC SEL/telemetry checks run against the dedicated host
    # this module launches (one instance serves every host-scoped check), so
    # the observability run is self-contained under any platform column.
    host_logs:
      checks:
        HostSyslogCheck:
          test_id: "OBS18-01"
          labels: ["min_req", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: host_syslogs

    bmc_logs:
      checks:
        BmcSelLogsCheck:
          test_id: "OBS17-01"
          labels: ["min_req", "observability", "security"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: bmc_sel_logs

    bmc_telemetry:
      checks:
        BmcGpuTelemetryCheck:
          test_id: "TELEM04-01"
          labels: ["gpu", "min_req", "observability", "security"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: bmc_gpu_telemetry

    storage_capacity_telemetry:
      checks:
        StorageCapacityTelemetryCheck:
          test_id: "TELEM05-01"
          labels: ["min_req", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: storage_capacity_telemetry

    storage_performance_telemetry:
      checks:
        StoragePerformanceTelemetryCheck:
          test_id: "TELEM06-01"
          labels: ["min_req", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: storage_performance_telemetry

    gpu_nvlink_telemetry:
      checks:
        GpuNvlinkTelemetryCheck:
          test_id: "TELEM07-01"
          labels: ["min_req", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: gpu_nvlink_telemetry

    switch_nvlink_telemetry:
      checks:
        SwitchNvlinkTelemetryCheck:
          test_id: "TELEM08-01"
          labels: ["min_req", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: switch_nvlink_telemetry

    fabric_logs:
      checks:
        FabricManagerLogsCheck:
          test_id: "OBS11-01"
          labels: ["min_req", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: fabric_manager_logs
        UfmEventLogsCheck:
          test_id: "OBS13-01"
          labels: ["min_req", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: ufm_event_logs

    subnet_manager_logs:
      checks:
        SubnetManagerLogsCheck:
          test_id: "OBS12-01"
          labels: ["min_req", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: subnet_manager_logs

    switch_logs:
      checks:
        GeneralSwitchLogsCheck:
          test_id: "OBS14-01"
          labels: ["min_req", "network", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: general_switch_logs
        SwitchSyslogCheck:
          test_id: "OBS15-01"
          labels: ["min_req", "network", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: switch_syslogs
        SwitchKernelLogsCheck:
          test_id: "OBS16-01"
          labels: ["min_req", "network", "observability"]
          platforms: ["bare_metal", "kubernetes", "slurm", "vm"]
          step: switch_kernel_logs

  exclude:
    labels: []
