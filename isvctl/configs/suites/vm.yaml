# VM (Virtual Machine) Validation - Canonical Contract
#
# Validations-only contract for VM. Provider configs import this file
# and supply their own commands (steps + scripts).
#
# This file defines WHAT to validate, not HOW to run it. Each validation
# only inspects JSON output fields. As long as your scripts output the
# right fields, the validations pass regardless of which cloud you use.
#
# Quick start:
#   1. Copy providers/my-isv/config/vm.yaml to providers/<your-platform>/config/vm.yaml
#   2. Replace stub paths with your platform scripts
#   3. Run: uv run isvctl test run -f isvctl/configs/providers/<your-platform>/config/vm.yaml
#
# See also:
#   - my-isv living example: providers/my-isv/config/vm.yaml
#   - AWS reference: providers/aws/config/vm.yaml + providers/aws/scripts/vm/
#   - Per-step field breakdown: ../suites/README.md

version: "1.0"

tests:
  platform: vm
  cluster_name: "vm-validation"
  description: "VM (virtual machine) GPU validation tests"

  settings:
    # Provider-specific - override in your provider config
    region: ""
    instance_type: ""
    teardown_flag: "{{(env.VM_SKIP_TEARDOWN == 'true') | ternary('--skip-destroy', '')}}"

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  #
  # Layout mirrors bare_metal.yaml:
  #   launch checks -> list -> tags -> serial_console -> console_rbac -> cloud_init
  #   -> describe_instance (SSH / GPU / host anchor, post-reboot)
  #   -> lifecycle (stop / start / reboot)
  #   -> NIM -> teardown
  validations:
    setup_checks:
      step: launch_instance
      checks:
        InstanceStateCheck:
          expected_state: "running"

    specified_key:
      step: launch_instance
      checks:
        InstanceSpecifiedKeyCheck: {}

    instance_created:
      step: launch_instance
      checks:
        InstanceCreatedCheck: {}

    list_instances:
      step: list_instances
      checks:
        InstanceListCheck:
          min_count: 1

    tag_checks:
      step: verify_tags
      checks:
        InstanceTagCheck:
          required_keys: ["Name", "CreatedBy"]

    serial_console:
      step: serial_console
      checks:
        SerialConsoleCheck: {}

    console_rbac:
      step: console_rbac
      checks:
        ConsoleRbacCheck: {}

    virtual_device_hardening:
      step: virtual_device_hardening
      checks:
        VirtualDeviceHardeningCheck: {}

    cloud_init:
      step: launch_instance
      checks:
        CloudInitCheck: {}

    # ─── Host-level validations anchored to describe_instance ────────
    # describe_instance runs AFTER reboot, so these checks prove the
    # host and its software survived the full stop/start/reboot lifecycle.
    instance_info:
      step: describe_instance
      checks:
        InstanceStateCheck:
          expected_state: "running"

    ssh:
      step: describe_instance
      checks:
        ConnectivityCheck: {}
        OsCheck:
          expected_os: "ubuntu"

    gpu:
      step: describe_instance
      checks:
        GpuCheck:
          expected_gpus: 1

    host_os:
      step: describe_instance
      checks:
        VcpuPinningCheck: {}
        PciBusCheck:
          expected_gpus: 1
        HostSoftwareCheck: {}

    driver_info:
      step: describe_instance
      checks:
        DriverCheck: {}

    cpu_info:
      step: describe_instance
      checks:
        CpuInfoCheck: {}

    container_runtime:
      step: describe_instance
      checks:
        ContainerRuntimeCheck: {}

    # ─── Lifecycle validations ───────────────────────────────────────
    stop_checks:
      step: stop_instance
      checks:
        InstanceStopCheck: {}

    start_checks:
      step: start_instance
      checks:
        InstanceStartCheck: {}
        StableIdentifierCheck:
          reference_id: "{{steps.launch_instance.instance_id}}"

    start_ssh:
      step: start_instance
      checks:
        ConnectivityCheck: {}
        OsCheck:
          expected_os: "ubuntu"

    start_gpu:
      step: start_instance
      checks:
        GpuCheck:
          expected_gpus: 1

    reboot_checks:
      step: reboot_instance
      checks:
        InstanceRebootCheck:
          max_uptime: 600
        StableIdentifierCheck:
          reference_id: "{{steps.launch_instance.instance_id}}"

    reboot_state:
      step: reboot_instance
      checks:
        InstanceStateCheck:
          expected_state: "running"

    reboot_ssh:
      step: reboot_instance
      checks:
        ConnectivityCheck: {}
        OsCheck:
          expected_os: "ubuntu"

    reboot_gpu:
      step: reboot_instance
      checks:
        GpuCheck:
          expected_gpus: 1

    # ─── NIM validations ─────────────────────────────────────────────
    nim_health:
      step: deploy_nim
      checks:
        NimHealthCheck: {}

    nim_models:
      step: deploy_nim
      checks:
        NimModelCheck: {}

    nim_inference:
      step: deploy_nim
      checks:
        NimInferenceCheck:
          prompt: "What is CUDA?"
          max_tokens: 50

    # ─── Teardown validations ────────────────────────────────────────
    nim_teardown:
      step: teardown_nim
      checks:
        StepSuccessCheck: {}

    teardown_checks:
      step: teardown
      checks:
        StepSuccessCheck: {}

    # ─── Block storage validations (DATASVC-XX-02/03/04) ─────────────
    # Optional persistent block-volume coverage. These only activate when
    # the provider config supplies the matching volume steps (see
    # providers/<p>/config/block-storage.yaml). A standard VM run that omits
    # those steps skips these checks automatically.
    #
    # A shared fixture launches one instance (setup_checks above) and creates
    # + attaches a single block volume (create_volume), formatted, mounted, and
    # seeded with a sentinel file. The three test-phase checks reuse it:
    #   - snapshot_lifecycle  - DATASVC-XX-02 (#321): snapshot -> restore ->
    #     re-attach + mount the restore, verify the sentinel survived.
    #   - volume_resize       - DATASVC-XX-03 (#322): grow the volume, then the
    #     in-guest partition + filesystem, and confirm the guest sees it.
    #   - volume_persistence  - DATASVC-XX-04 (#323): stop + start the instance
    #     and confirm the volume stays attached with its data intact.
    fixture_volume:
      step: create_volume
      checks:
        StepSuccessCheck: {}
        FieldExistsCheck:
          fields: ["volume_id", "mount_point", "operations"]
        CrudOperationsCheck:
          operations: ["create", "attach", "format", "mount", "write_sentinel"]

    snapshot_lifecycle:
      step: snapshot_lifecycle
      checks:
        StepSuccessCheck: {}
        FieldExistsCheck:
          fields: ["volume_id", "snapshot_id", "operations"]
        CrudOperationsCheck:
          operations: ["create_snapshot", "restore_volume", "verify_data"]

    volume_resize:
      step: volume_resize
      checks:
        StepSuccessCheck: {}
        FieldExistsCheck:
          fields: ["volume_id", "operations"]
        CrudOperationsCheck:
          operations: ["modify_volume", "grow_partition", "resize_filesystem", "verify_size"]

    volume_persistence:
      step: volume_persistence
      checks:
        StepSuccessCheck: {}
        FieldExistsCheck:
          fields: ["volume_id", "operations"]
        CrudOperationsCheck:
          operations: ["stop", "start", "verify_attached", "verify_data"]

    volume_teardown_checks:
      step: teardown_volume
      checks:
        StepSuccessCheck: {}

  exclude:
    labels: []
