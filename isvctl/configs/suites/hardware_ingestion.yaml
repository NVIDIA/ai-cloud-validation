# Hardware Ingestion Validation - Canonical Contract
#
# Validations-only contract for bare-metal hardware ingestion. Provider
# configs import this file and supply their own commands (steps + scripts).
#
# This file defines WHAT to validate, not HOW to run it. The validation
# only inspects JSON output fields: as long as your ingestion script emits
# the expected fields, the validation passes regardless of control plane.
#
# Quick start:
#   1. Copy providers/nico/config/hardware_ingestion.yaml to
#      providers/<your-platform>/config/hardware_ingestion.yaml
#   2. Replace stub paths with your platform scripts
#   3. Run: uv run isvctl test run -f isvctl/configs/providers/<your-platform>/config/hardware_ingestion.yaml
#
# See also:
#   - NICo reference: providers/nico/config/hardware_ingestion.yaml +
#     providers/nico/scripts/hardware_ingestion/
#   - Per-step field breakdown: ../suites/README.md

version: "1.0"

tests:
  platform: hardware_ingestion
  cluster_name: "hardware-ingestion-validation"
  description: "Verify all expected hardware is ingested and healthy"

  # ─── Validations ─────────────────────────────────────────────────
  # PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    ingestion_check:
      step: verify_ingestion
      checks:
        HardwareIngestionCheck:
          min_machines: 1
          expected_status: ["Ready", "InUse"]
          require_healthy: true

  exclude:
    labels: []
