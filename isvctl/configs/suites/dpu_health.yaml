# DPU Health Validation - Canonical Contract
#
# Validations-only contract for DPU health. Provider configs import this
# file and supply their own commands (steps + scripts).
#
# This file defines WHAT to validate, not HOW to run it. The validation
# only inspects JSON output fields: DPU presence, agent heartbeat, and
# health alerts at the machine level.
#
# Note: DpuNetworkCheck (interface status, BGP, extension services)
# requires an active instance with EVPN overlay, so it is intentionally
# not part of this machine-level contract. Wire it into a separate config
# once a live instance is available.
#
# Quick start:
#   1. Copy providers/nico/config/dpu_health.yaml to
#      providers/<your-platform>/config/dpu_health.yaml
#   2. Replace stub paths with your platform scripts
#   3. Run: uv run isvctl test run -f isvctl/configs/providers/<your-platform>/config/dpu_health.yaml
#
# See also:
#   - NICo reference: providers/nico/config/dpu_health.yaml +
#     providers/nico/scripts/dpu/
#   - Per-step field breakdown: ../suites/README.md

version: "1.0"

tests:
  platform: dpu_health
  cluster_name: "dpu-health-validation"
  description: "Verify DPU health and agent heartbeat status"

  # ─── Validations ─────────────────────────────────────────────────
  # PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    dpu_health:
      step: check_dpu_health
      checks:
        DpuHealthCheck:
          require_heartbeat: true
          # Set expected_dpu_count per your hardware (e.g., 2 for GB200 NVL tray)
          # expected_dpu_count: 2

  exclude:
    labels: []
