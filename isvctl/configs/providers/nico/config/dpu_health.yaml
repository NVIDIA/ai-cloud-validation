# NICo DPU Health Validation Configuration
#
# Imports the provider-agnostic dpu_health contract and wires the command
# to the NICo DPU health script in scripts/dpu/.
#
# Architecture:
#   - check_dpu_health.py queries the NICo API for machine health data
#   - DpuHealthCheck (from the imported suite) validates DPU presence,
#     heartbeat, and alerts
#
# Prerequisites:
#   - NICO_API_BASE set when using a non-production or port-forwarded NICo API
#   - NICO_BEARER_TOKEN set, or OIDC client credentials configured via
#     NICO_ISSUER_URL, NICO_CLIENT_ID, and NICO_CLIENT_SECRET
#   - Machines ingested and DPUs initialized
#   - NGC_ORG and NICO_SITE_ID environment variables set
#
# Usage:
#   NICO_BEARER_TOKEN=<token> NGC_ORG=<org> NICO_SITE_ID=<uuid> \
#     uv run isvctl test run -f isvctl/configs/providers/nico/config/dpu_health.yaml

import:
  - ../../../suites/dpu_health.yaml

version: "1.0"

commands:
  dpu_health:
    phases: ["test"]
    steps:
      # ─── Step 1: Check DPU Health ──────────────────────────────────
      # Queries NICo API for machine health data including DPU-specific
      # probes, agent heartbeat status, and capability inventory.
      - name: check_dpu_health
        phase: test
        command: "python ../scripts/dpu/check_dpu_health.py"
        args:
          - "--org"
          - "{{org}}"
          - "--site-id"
          - "{{site_id}}"
          - "--api-base"
          - "{{nico_api_base}}"
        timeout: 120

tests:
  cluster_name: "nico-dpu-health-validation"
  description: "Verify NICo DPU health and agent heartbeat status"

  settings:
    org: "{{env.NGC_ORG}}"
    site_id: "{{env.NICO_SITE_ID}}"
    nico_api_base: "{{env.NICO_API_BASE | default('https://api.ngc.nvidia.com/v2/org')}}"
