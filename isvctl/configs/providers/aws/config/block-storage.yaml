# AWS Block Storage (EBS) Validation Configuration
#
# Block storage is validated as part of the VM contract, so this config
# imports suites/vm.yaml and supplies only the volume steps. The VM
# validations whose steps are omitted here are skipped automatically; the
# block-storage validations (fixture_volume / snapshot_lifecycle /
# volume_resize / volume_persistence) activate because the matching steps
# below are present. This file only provides AWS-specific commands
# (boto3 + SSH) and settings. The launch_instance / teardown steps reuse
# the VM reference scripts; the volume steps live in scripts/block-storage/.
#
# Steps:
#   SETUP
#     1. launch_instance    - boto3: provision an instance for the fixture
#     2. create_volume      - boto3 + SSH: create/attach/format/mount/seed an EBS volume
#   TEST
#     3. snapshot_lifecycle - DATASVC-XX-02 (#321): snapshot -> restore -> verify data
#     4. volume_resize      - DATASVC-XX-03 (#322): ModifyVolume + growpart/resize2fs
#     5. volume_persistence - DATASVC-XX-04 (#323): stop/start -> verify reattach + data
#   TEARDOWN
#     6. teardown_volume    - boto3: detach + delete the fixture volume
#     7. teardown           - boto3: terminate the instance + SG + key pair
#
# Usage:
#   uv run isvctl test run -f isvctl/configs/providers/aws/config/block-storage.yaml
#
# Required IAM Permissions:
#   ec2:DescribeInstances, ec2:RunInstances, ec2:TerminateInstances,
#   ec2:StopInstances, ec2:StartInstances, ec2:DescribeImages, ec2:DescribeSubnets,
#   ec2:DescribeVpcs, ec2:CreateKeyPair, ec2:DeleteKeyPair, ec2:CreateSecurityGroup,
#   ec2:DeleteSecurityGroup, ec2:AuthorizeSecurityGroupIngress, ec2:CreateTags,
#   ec2:CreateVolume, ec2:DeleteVolume, ec2:DescribeVolumes, ec2:AttachVolume,
#   ec2:DetachVolume, ec2:ModifyVolume, ec2:DescribeVolumesModifications,
#   ec2:CreateSnapshot, ec2:DeleteSnapshot, ec2:DescribeSnapshots

import:
  - ../../../suites/vm.yaml

version: "1.0"

commands:
  vm:
    phases: ["setup", "test", "teardown"]
    steps:
      # AWS-specific: launch the fixture instance (reuses the VM script)
      - name: launch_instance
        phase: setup
        command: "python3 ../scripts/vm/launch_instance.py"
        args:
          - "--name"
          - "isv-test-block"
          - "--instance-type"
          - "{{instance_type}}"
          - "--region"
          - "{{region}}"
        timeout: 600

      # AWS-specific: create + attach + format + mount + seed an EBS volume
      - name: create_volume
        phase: setup
        command: "python3 ../scripts/block-storage/create_volume.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--size-gib"
          - "{{volume_size_gib}}"
        timeout: 600

      # DATASVC-XX-02: snapshot -> restore -> verify data
      - name: snapshot_lifecycle
        phase: test
        command: "python3 ../scripts/block-storage/snapshot_lifecycle.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--volume-id"
          - "{{steps.create_volume.volume_id}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--expected-content"
          - "{{steps.create_volume.sentinel_content}}"
        timeout: 900

      # DATASVC-XX-03: ModifyVolume + in-guest growpart/resize2fs
      - name: volume_resize
        phase: test
        command: "python3 ../scripts/block-storage/volume_resize.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--volume-id"
          - "{{steps.create_volume.volume_id}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--mount-point"
          - "{{steps.create_volume.mount_point}}"
        timeout: 900

      # DATASVC-XX-04: stop/start -> verify reattach + data
      # Runs last so the stop/start IP churn does not affect the other tests.
      - name: volume_persistence
        phase: test
        command: "python3 ../scripts/block-storage/volume_persistence.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--volume-id"
          - "{{steps.create_volume.volume_id}}"
          - "--key-file"
          - "{{steps.launch_instance.key_file}}"
          - "--mount-point"
          - "{{steps.create_volume.mount_point}}"
          - "--expected-content"
          - "{{steps.create_volume.sentinel_content}}"
        timeout: 900

      # AWS-specific: detach + delete the fixture volume
      - name: teardown_volume
        phase: teardown
        command: "python3 ../scripts/block-storage/teardown_volume.py"
        args:
          - "--region"
          - "{{region}}"
          - "--volume-id"
          - "{{steps.create_volume.volume_id}}"
          - "{{teardown_flag}}"
        timeout: 300

      # AWS-specific: terminate the instance (reuses the VM script)
      - name: teardown
        phase: teardown
        command: "python3 ../scripts/vm/teardown.py"
        args:
          - "--instance-id"
          - "{{steps.launch_instance.instance_id}}"
          - "--region"
          - "{{region}}"
          - "--delete-key-pair"
          - "--delete-security-group"
          - "{{teardown_flag}}"
        timeout: 600

tests:
  cluster_name: "aws-block-storage-validation"
  description: "AWS block storage (EBS) validation tests"

  settings:
    region: "us-west-2"
    instance_type: "m6i.large"
    volume_size_gib: "10"
    teardown_flag: "{{(env.BLOCK_STORAGE_SKIP_TEARDOWN == 'true') | ternary('--skip-destroy', '')}}"

  # Block storage reuses the VM contract (suites/vm.yaml) for its fixture but
  # does not validate the VM host itself. The ssh-labelled VM host checks
  # (cloud-init / GPU / OS / driver / NIM, etc.) are excluded; the VM checks
  # whose steps this config omits are skipped automatically.
  exclude:
    labels: ["ssh"]
