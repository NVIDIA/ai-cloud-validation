# GCP GKE Cluster Validation Configuration.
#
# Imports the provider-agnostic Kubernetes contract from suites/k8s.yaml and
# wires every lifecycle step to a Python stub under providers/gcp/scripts/k8s/
# that drives Terraform (official hashicorp/google provider) for the cluster /
# node-pool CREATE / SCALE / DESTROY lifecycle, plus `gcloud container clusters
# get-credentials` + ambient kubectl for the kubeconfig install and in-cluster
# inventory. This mirrors the AWS EKS realism oracle
# (providers/aws/config/eks.yaml + scripts/eks/*), translated onto GKE.
#
# GKE natively supports control-plane logs (Cloud Logging), NetworkPolicy
# enforcement (Dataplane V2), and authorized networks, so the three checks the
# EKS oracle excludes as provider gaps (K8sControlPlaneLogsCheck /
# K8sNetworkPolicyCheck / K8sApiNetworkAclCheck) are NOT excluded here — each
# adapts to a real GKE signal (see the validation overrides + setup stub).
#
# Auth is Application Default Credentials (google.auth.default()); RUN_ID is the
# REQUIRED run-scope id the k8s lifecycle hard-fails on when unset (expensive GPU
# leak domain). Operator env vars are documented in docs/references/gcp.md and
# the domain guide providers/gcp/scripts/k8s/docs/gcp-k8s.md.
#
# Usage:
#   RUN_ID=$(openssl rand -hex 4) \
#   GCP_K8S_LOCATION=us-central1 GCP_K8S_CPU_MACHINE_TYPE=e2-standard-4 \
#   GCP_K8S_GPU_MACHINE_TYPE=g2-standard-8 GCP_K8S_GPU_ACCELERATOR_TYPE=nvidia-l4 \
#     uv run isvctl test run -f isvctl/configs/providers/gcp/config/k8s.yaml

import:
  - ../../../suites/k8s.yaml

version: "1.0"

commands:
  kubernetes:
    phases: ["setup", "test", "teardown"]
    steps:
      # Provision the primary cluster (google_container_cluster + managed-
      # autoscaled system pool + fixed baseline GPU pool), install the kubeconfig,
      # verify the live VPC + authorized-networks policy + system-pool autoscaling,
      # bridge the nvidia RuntimeClass + GPU node labels, gate on the provider-
      # native GPU readiness signals, install the pinned MPI Operator, then emit
      # inventory observed live via kubectl. Worst-case internal wait stack: GPU
      # capacity preflight (~3 zones * ~270s = 810s) + cluster+GPU-pool terraform
      # apply (<=3600s, must exceed the google provider's 40m/30m create timeouts)
      # + kubeconfig (<=180s) + network verify + RuntimeClass (<=180s) + system-
      # pool autoscaling readback/reconcile (<=600s) + GPU readiness gate (<=900s)
      # + MPI Operator apply + readiness (<=300s) + inventory reads (<=300s) ~=
      # 6870s; 7200s is margin over that sum, and it exceeds the inner apply budget
      # (never outer < inner).
      - name: setup
        phase: setup
        command: "python3 ../scripts/k8s/setup.py"
        output_schema: cluster
        args:
          - "--cluster-name"
          - "isv-gke"
          - "--location"
          - "{{location}}"
          - "{{kube_version_flag}}"
          - "--cpu-machine-type"
          - "{{cpu_machine_type}}"
          - "--gpu-machine-type"
          - "{{gpu_machine_type}}"
          - "--gpu-accelerator-type"
          - "{{gpu_accelerator_type}}"
          - "--gpu-accelerator-count"
          - "{{gpu_accelerator_count}}"
          - "--gpu-node-count"
          - "{{gpu_node_count}}"
          - "--gpu-node-locations"
          - "{{gpu_node_locations}}"
          # VPC shared by the cluster + the baseline GPU capacity-preflight MIG.
          - "--network"
          - "{{network}}"
          # API-ACL capability pair (sentinel "none" -> absence in setup): enable
          # master_authorized_networks and bind the rendered outside-vantage probe.
          - "--authorized-cidrs"
          - "{{authorized_cidrs}}"
          - "--unauthorized-probe-template"
          - "{{unauthorized_probe_template}}"
          # GKE-managed autoscaling bounds for the CPU/system pool (GPU pools stay
          # fixed for the capacity-preflight contract). Verified live after apply.
          - "--system-min-nodes"
          - "{{system_min_nodes}}"
          - "--system-max-nodes"
          - "{{system_max_nodes}}"
        timeout: 7200

      # K8S26-01: prove a second GKE cluster coexists in the SAME VPC network as
      # the primary (native on GKE). Gated by requires_available_validations on
      # the RELEASED K8sMultiClusterSameVpcCheck, so it runs whenever that check
      # is selected (the default). Worst-case: secondary cluster apply (<=1500s) +
      # live membership describe (<=200s) + >=1 Ready node wait (<=900s) ~= 2600s.
      - name: create_test_shared_vpc_cluster
        phase: setup
        command: "python3 ../scripts/k8s/create_test_shared_vpc_cluster.py"
        output_schema: multi_cluster
        requires_available_validations:
          - K8sMultiClusterSameVpcCheck
        args:
          - "--cluster-name"
          - "isv-gke-secondary"
          - "--location"
          - "{{location}}"
        timeout: 2700

      # Create the CPU test pool (its own tfstate, cluster read via
      # terraform_remote_state) with the dedicated NoSchedule taint that
      # K8sNodePoolCheck validates. Worst-case: terraform apply (<=1500s) +
      # output reads ~= 1550s.
      - name: create_test_node_pool
        phase: setup
        command: "python3 ../scripts/k8s/create_node_pool.py"
        output_schema: node_pool
        args:
          - "--pool-name"
          - "isv-test-pool"
          - "--node-count"
          - "{{cpu_node_count}}"
          - "--machine-type"
          - "{{cpu_machine_type}}"
          - "--labels-json"
          - '{"isv.ncp.validation/workload":"data-ingest"}'
          - "--taints-json"
          - '[{"key":"isv.ncp.validation/dedicated","value":"test","effect":"NoSchedule"}]'
        timeout: 1800

      # Create the GPU test pool (separate tfstate, node_config.guest_accelerator).
      # UNTAINTED so K8sGpuPodAccessCheck can place a probe pod on its nodes. The
      # GPU zone is chosen by the capacity preflight, and after apply a POOL-SCOPED
      # completion gate waits for THIS pool's nodes to be Ready with allocatable
      # nvidia.com/gpu, then bridges + reads back nvidia.com/gpu.present=true on
      # them (any timeout/labeling error/readback miss fails the step). Worst-case:
      # GPU capacity preflight (~810s) + terraform apply (<=3000s, must exceed the
      # google provider's 30m node-pool create timeout) + kubeconfig (<=180s) +
      # pool readiness+bridge gate (<=360s) ~= 4350s; 4500s is margin and exceeds
      # the inner apply budget (never outer < inner).
      - name: create_test_gpu_node_pool
        phase: setup
        command: "python3 ../scripts/k8s/create_node_pool.py"
        output_schema: node_pool
        args:
          - "--pool-name"
          - "isv-test-gpu-pool"
          - "--node-count"
          - "{{gpu_node_count}}"
          - "--machine-type"
          - "{{gpu_machine_type}}"
          - "--accelerator-type"
          - "{{gpu_accelerator_type}}"
          - "--accelerator-count"
          - "{{gpu_accelerator_count}}"
          - "--gpu-node-locations"
          - "{{gpu_node_locations}}"
          - "--labels-json"
          - '{"isv.ncp.validation/workload":"gpu-compute"}'
        timeout: 4500

      # Throwaway CPU pool that exists ONLY for the delete proof (K8S06-03):
      # created here in setup, removed in the test phase by delete_test_node_pool,
      # with a teardown safety net (destroy_test_delete_node_pool). Its own
      # name-derived tfstate isolates it from the CPU/GPU validation pools, so no
      # other check depends on it. Stamped with the stable isv.ncp.validation/pool=test
      # marker so K8sNodeCountCheck's exclude_label_selector keeps it out of the
      # baseline count. Worst-case: terraform apply (<=1500s) + output reads ~= 1550s.
      - name: create_test_delete_node_pool
        phase: setup
        command: "python3 ../scripts/k8s/create_node_pool.py"
        output_schema: node_pool
        args:
          - "--pool-name"
          - "isv-test-delete-pool"
          - "--node-count"
          - "1"
          - "--machine-type"
          - "{{cpu_machine_type}}"
          - "--labels-json"
          - '{"isv.ncp.validation/pool":"test"}'
          - "--taints-json"
          - "[]"
        timeout: 1800

      # Scale the SAME CPU pool (same pool name -> same tfstate) to a higher
      # count; terraform updates the node pool in place. Runs in the test phase
      # so the create check asserts the initial count before this scales it.
      # Worst-case: in-place terraform apply (<=1500s).
      - name: update_test_node_pool
        phase: test
        command: "python3 ../scripts/k8s/create_node_pool.py"
        output_schema: node_pool
        args:
          - "--pool-name"
          - "isv-test-pool"
          - "--node-count"
          - "{{cpu_scale_node_count}}"
          - "--machine-type"
          - "{{cpu_machine_type}}"
          - "--labels-json"
          - '{"isv.ncp.validation/workload":"data-ingest"}'
          - "--taints-json"
          - '[{"key":"isv.ncp.validation/dedicated","value":"test","effect":"NoSchedule"}]'
        timeout: 1800

      # Delete the throwaway pool (K8S06-03) in the TEST phase so the matching
      # K8sNodePoolCheck observes its selector reach zero nodes after the create
      # check asserted it. NO {{teardown_flag}} here: this is a functional test
      # action that must run even when GCP_K8S_SKIP_TEARDOWN=true, not a teardown
      # cleanup. Worst-case: terraform destroy (<=1200s).
      - name: delete_test_node_pool
        phase: test
        command: "python3 ../scripts/k8s/destroy_node_pool.py"
        args:
          - "--pool-name"
          - "isv-test-delete-pool"
          # Deterministic parent identity so a state-loss reconcile can describe the
          # EXACT pool under its run-owned parent live before reporting clean.
          - "--cluster-name"
          - "isv-gke"
          - "--location"
          - "{{location}}"
        timeout: 1500

      # Teardown order: destroy both test node pools before the cluster teardown.
      # Exact-ownership via the tfstate derived from the run-scoped pool name.
      # {{teardown_flag}} forwards GCP_K8S_SKIP_TEARDOWN=true here too, so a
      # preservation request keeps the node pools (not just the primary cluster);
      # each dependent destroy short-circuits before auth/Terraform. Worst-case:
      # terraform destroy (<=1200s).
      - name: destroy_test_node_pool
        phase: teardown
        command: "python3 ../scripts/k8s/destroy_node_pool.py"
        args:
          - "--pool-name"
          - "isv-test-pool"
          # Deterministic parent identity so a state-loss reconcile can describe the
          # EXACT pool under its run-owned parent live before reporting clean.
          - "--cluster-name"
          - "isv-gke"
          - "--location"
          - "{{location}}"
          - "{{teardown_flag}}"
        timeout: 1500

      - name: destroy_test_gpu_node_pool
        phase: teardown
        command: "python3 ../scripts/k8s/destroy_node_pool.py"
        args:
          - "--pool-name"
          - "isv-test-gpu-pool"
          # Deterministic parent identity so a state-loss reconcile can describe the
          # EXACT pool under its run-owned parent live before reporting clean.
          - "--cluster-name"
          - "isv-gke"
          - "--location"
          - "{{location}}"
          - "{{teardown_flag}}"
        timeout: 1500

      # Destroy the secondary shared-VPC cluster before the primary teardown so
      # it releases the shared network first. {{teardown_flag}} forwards
      # preservation here too so a skip keeps the secondary in lockstep with the
      # primary. Worst-case: terraform destroy (<=1500s).
      - name: destroy_test_shared_vpc_cluster
        phase: teardown
        command: "python3 ../scripts/k8s/destroy_test_shared_vpc_cluster.py"
        args:
          - "--cluster-name"
          - "isv-gke-secondary"
          # Deterministic location so an absent/valid-empty state can still describe
          # the EXACT secondary cluster for the live reconcile before reporting clean.
          - "--location"
          - "{{location}}"
          - "{{teardown_flag}}"
        timeout: 1800

      # Idempotent safety net for the throwaway delete-proof pool in case the
      # test-phase delete_test_node_pool did not run (already-absent state is
      # success). {{teardown_flag}} forwards a preservation request in lockstep
      # with the other destroys. Worst-case: terraform destroy (<=1200s).
      - name: destroy_test_delete_node_pool
        phase: teardown
        command: "python3 ../scripts/k8s/destroy_node_pool.py"
        args:
          - "--pool-name"
          - "isv-test-delete-pool"
          # Deterministic parent identity so a state-loss reconcile can describe the
          # EXACT pool under its run-owned parent live before reporting clean.
          - "--cluster-name"
          - "isv-gke"
          - "--location"
          - "{{location}}"
          - "{{teardown_flag}}"
        timeout: 1500

      # Reclaim run PVC-backed PDs, destroy the primary cluster, backstop any
      # raced PD AND any leftover GPU-preflight probe MIG/template. The cluster
      # label / probe name only DISCOVER candidates; a delete is authorized ONLY by
      # this run's full-identity ownership ledger, and an unprovable or surviving
      # resource fails closed (cleanup_errors + success=False). Honors
      # GCP_K8S_SKIP_TEARDOWN.
      # Longest single internal wait is terraform destroy (<=2400s); the reclaim
      # list/delete calls are short and independent, well under the 3000s step
      # timeout.
      - name: teardown
        phase: teardown
        command: "python3 ../scripts/k8s/teardown.py"
        args:
          - "--cluster-name"
          - "isv-gke"
          # Deterministic location so an absent/valid-empty state can still describe
          # the EXACT primary cluster for the live reconcile before reporting clean.
          - "--location"
          - "{{location}}"
          - "{{teardown_flag}}"
        timeout: 3000

tests:
  description: "GCP GKE GPU cluster validation"

  settings:
    # REQUIRED (no safe public default — operator-owned).
    location: "{{env.GCP_K8S_LOCATION}}"
    cpu_machine_type: "{{env.GCP_K8S_CPU_MACHINE_TYPE}}"
    gpu_machine_type: "{{env.GCP_K8S_GPU_MACHINE_TYPE}}"
    gpu_accelerator_type: "{{env.GCP_K8S_GPU_ACCELERATOR_TYPE}}"

    # OPTIONAL value-flag: min_master_version rendered as ONE `--kube-version=<v>`
    # token, or empty -> dropped when GCP_K8S_KUBE_VERSION is unset (GKE then uses
    # the REGULAR channel default). Single-token idiom (cf. teardown_flag) — a
    # bare `--kube-version` + a separate empty value token would orphan the flag.
    kube_version_flag: "{{ ('--kube-version=' ~ (env.GCP_K8S_KUBE_VERSION | default(''))) if (env.GCP_K8S_KUBE_VERSION | default('')) else '' }}"

    # OPTIONAL (fall through to a suite default).
    cpu_node_count: "{{env.GCP_K8S_CPU_NODE_COUNT | default('1', true)}}"
    cpu_scale_node_count: "{{env.GCP_K8S_CPU_SCALE_NODE_COUNT | default('2', true)}}"
    gpu_node_count: "{{env.GCP_K8S_GPU_NODE_COUNT | default('1', true)}}"
    # OPTIONAL GKE-managed autoscaler bounds for the CPU/system pool (per zone).
    # min seeds the pool; max caps it. GKE runs the autoscaler in its managed
    # control plane, so there is no in-cluster cluster-autoscaler Deployment.
    system_min_nodes: "{{env.GCP_K8S_SYSTEM_MIN_NODES | default('1', true)}}"
    system_max_nodes: "{{env.GCP_K8S_SYSTEM_MAX_NODES | default('3', true)}}"
    gpu_accelerator_count: "{{env.GCP_K8S_GPU_ACCELERATOR_COUNT | default('1', true)}}"
    # OPTIONAL ordered candidate zones for the GPU capacity preflight. Falls back
    # to the GCP_K8S_LOCATION value (never empty in a live run, since location is
    # required) so the `--gpu-node-locations` value token is never dropped.
    gpu_node_locations: "{{ env.GCP_K8S_GPU_ZONES | default(env.GCP_K8S_LOCATION | default('', true), true) }}"

    # OPTIONAL VPC name or self-link shared by the GKE cluster and every standalone
    # GPU capacity-preflight MIG. Unset/blank -> `default` (projects that retain the
    # auto-created default VPC). Custom-VPC-only projects MUST set GCP_K8S_NETWORK;
    # the test GPU pool reads the primary cluster's Terraform network output so its
    # capacity probe never drifts to another VPC. Blank-sensitive default.
    network: "{{env.GCP_K8S_NETWORK | default('default', true)}}"

    # OPTIONAL API-ACL capability pair. authorized_cidrs is a comma-separated list of
    # operator-approved CIDRs allowed to reach the GKE control-plane public endpoint;
    # unauthorized_probe_template is an outside-vantage command template that MUST
    # contain the literal {api_endpoint}. Each renders the non-empty sentinel "none"
    # when its env var is unset/blank (the arg renderer drops empty value tokens);
    # setup normalizes "none" back to absence. When authorized_cidrs is set, setup
    # enables master_authorized_networks_config and rejects world-open 0.0.0.0/0 / ::/0.
    # K8sApiNetworkAclCheck is substantive only when BOTH are configured; otherwise it
    # honestly structured-skips.
    authorized_cidrs: "{{env.GCP_K8S_AUTHORIZED_CIDRS | default('none', true)}}"
    unauthorized_probe_template: "{{env.GCP_K8S_UNAUTHORIZED_PROBE_CMD | default('none', true)}}"

    # OPTIONAL. GCP_K8S_SKIP_TEARDOWN=true -> preserve the WHOLE run (primary
    # cluster + both test node pools + secondary cluster): --skip-destroy is
    # forwarded to EVERY teardown-phase destroy step, not just the primary
    # teardown, so no dependent resource is torn down while the primary is kept.
    # Unset -> destroy runs.
    teardown_flag: "{{(env.GCP_K8S_SKIP_TEARDOWN == 'true') | ternary('--skip-destroy', '')}}"

  validations:
    # Bind the RELEASED multi-cluster same-VPC check to the secondary-cluster step
    # so the `multi_cluster` payload has a consumer (mirrors
    # providers/aws/config/eks.yaml). Without this the expensive secondary cluster
    # provisions but nothing asserts same-VPC coexistence — the step would run
    # uncovered. The check is gated by the step's requires_available_validations,
    # so the secondary cluster is only provisioned when the check is selected.
    k8s_multi_cluster:
      checks:
        K8sMultiClusterSameVpcCheck:
          step: create_test_shared_vpc_cluster

    kubernetes:
      checks:
        # Scope the generic node count to the baseline cluster (system + baseline
        # GPU pool). Setup adds temporary CPU + GPU test pools (and the test phase
        # scales the CPU one), each node carrying the stable
        # isv.ncp.validation/pool=test marker, so one selector excludes both.
        K8sNodeCountCheck:
          count: "{{ steps.setup.kubernetes.node_count | default(4, true) }}"
          exclude_label_selector: "isv.ncp.validation/pool=test"
        # Each pod sees only its 1 allocated GPU, so this is a GPU-NODE count:
        # baseline GPU nodes + the untainted GPU test pool's replicas.
        K8sGpuPodAccessCheck:
          total_gpu_count: "{{ (steps.setup.kubernetes.gpu_node_count | default(0, true) | int) + (steps.create_test_gpu_node_pool.expected_replicas | default(0, true) | int) }}"
        # Exact GPU total = baseline total + (GPU test replicas * per-node GPUs).
        # GKE pins guest_accelerator.count so the per-node count is known.
        K8sGpuCapacityCheck:
          expected_total: "{{ (steps.setup.kubernetes.total_gpus | default(0, true) | int) + ((steps.create_test_gpu_node_pool.expected_replicas | default(0, true) | int) * (gpu_accelerator_count | default('1', true) | int)) }}"
    k8s_observability:
      checks:
        # GKE is a managed control plane (no control-plane pods in a namespace),
        # so mode=auto resolves each component via Cloud Logging. --project binds
        # to {{steps.setup.project}} — the project setup resolved through the FULL
        # canonical chain (explicit -> GOOGLE_CLOUD_PROJECT / GCLOUD_PROJECT ->
        # google.auth.default() ADC), so telemetry queries
        # the SAME project the cluster runs in instead of a partial
        # GOOGLE_CLOUD_PROJECT-only-plus-gcloud-config chain that omits
        # GCLOUD_PROJECT and ADC. Each query is scoped to THIS run's cluster via
        # resource.labels.cluster_name so it never validates a co-tenant's logs.
        # logging_config is enabled on the cluster (see terraform/main.tf).
        K8sControlPlaneLogsCheck:
          commands:
            kube-apiserver: "gcloud logging read 'resource.type=\"k8s_control_plane_component\" AND log_id(\"container.googleapis.com/apiserver\") AND resource.labels.cluster_name=\"{{steps.setup.cluster_name}}\"' --limit 20 --freshness 6h --project \"{{steps.setup.project}}\""
            kube-scheduler: "gcloud logging read 'resource.type=\"k8s_control_plane_component\" AND log_id(\"container.googleapis.com/scheduler\") AND resource.labels.cluster_name=\"{{steps.setup.cluster_name}}\"' --limit 20 --freshness 6h --project \"{{steps.setup.project}}\""
            kube-controller-manager: "gcloud logging read 'resource.type=\"k8s_control_plane_component\" AND log_id(\"container.googleapis.com/controller-manager\") AND resource.labels.cluster_name=\"{{steps.setup.cluster_name}}\"' --limit 20 --freshness 6h --project \"{{steps.setup.project}}\""

    k8s_workloads:
      checks:
        # The stress image nvcr.io/nvidia/pytorch:25.04-py3 is ~12GB and takes
        # ~5.5min to pull on a fresh GPU node — longer than the suite default
        # (300s) — so bump to 900s so a cold image pull completes.
        K8sGpuStressWorkload:
          timeout: 900
        # The baseline + validation GPU test pools provide two GPU nodes. The
        # suite otherwise derives this from only the baseline pool (normally 1);
        # pin it to 2 so the MPIJob spans both. Setup installs the pinned Kubeflow
        # MPI Operator (scripts/k8s/manifests/mpi-operator-v0.8.2.yaml) and gates
        # on its CRD + controller readiness, so this multi-node workload runs (it
        # no longer structured-skips on the missing GKE-default MPI Operator).
        # The released MPIJob launcher pins a node-role.kubernetes.io/control-plane
        # nodeAffinity, but GKE is a managed control plane with no schedulable
        # control-plane node, so the launcher would stay Pending and time out.
        # override_launcher_affinity drops that affinity so the launcher schedules
        # on any Ready worker node; the MPI Operator readiness gate and the
        # released bandwidth floor are unchanged.
        K8sNcclMultiNodeWorkload:
          nodes: 2
          override_launcher_affinity: true
        # Both 3B NIM paths cap the vLLM KV-cache token budget so llama-3.2-3b's
        # default 128K context fits the 24 GB L4 profile (the shared workloads
        # forward nim_max_model_len as NIM_MAX_MODEL_LEN). A2/A100 memory is not
        # required solely for this bounded-context check; the 1B sibling
        # K8sNimHelmWorkload-1b needs no cap.
        K8sNimInferenceWorkload:
          nim_max_model_len: 8192
        K8sNimHelmWorkload-3b:
          nim_max_model_len: 8192
