#
# Vendored, PINNED Kubeflow MPI Operator v0.8.2 (kubeflow.org/v2beta1) install
# manifest — a local provider-owned asset so GKE setup applies the multi-node
# NCCL MPIJob controller prerequisite WITHOUT downloading a GitHub/raw-URL
# manifest at runtime. GKE does not install the MPI Operator by default, so
# without this the released K8sNcclMultiNodeWorkload structured-skips and the
# multi-node GPU communication path goes uncovered.
#
# Upstream reference (Apache-2.0):
#   https://github.com/kubeflow/mpi-operator/tree/v0.8.2/deploy/v2beta1
#
# The MPIJob CRD schema uses a structural pass-through (the operator validates
# and reconciles the fields it owns); the served group/version/kind/plural
# (mpijobs.kubeflow.org, kind MPIJob, v2beta1) match the pinned release so the
# workload's `kubectl api-resources --api-group=kubeflow.org` prerequisite probe
# and its kubeflow.org/v2beta1 MPIJob objects resolve. Setup gates on the CRD
# becoming Established and the controller Deployment becoming Available.
---
apiVersion: v1
kind: Namespace
metadata:
  name: mpi-operator
  labels:
    app.kubernetes.io/name: mpi-operator
    app.kubernetes.io/component: mpijob-controller
    kubeflow.org/mpi-operator-version: v0.8.2
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mpijobs.kubeflow.org
  labels:
    app.kubernetes.io/name: mpi-operator
    kubeflow.org/mpi-operator-version: v0.8.2
spec:
  group: kubeflow.org
  scope: Namespaced
  names:
    kind: MPIJob
    listKind: MPIJobList
    plural: mpijobs
    singular: mpijob
    shortNames:
      - mj
      - mpij
  versions:
    - name: v2beta1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            MPIJob (kubeflow.org/v2beta1). The operator owns validation and
            reconciliation of the spec/status it manages; the schema preserves
            unknown fields so full pod templates in mpiReplicaSpecs are retained.
          x-kubernetes-preserve-unknown-fields: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mpi-operator
  namespace: mpi-operator
  labels:
    app.kubernetes.io/name: mpi-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mpi-operator
  labels:
    app.kubernetes.io/name: mpi-operator
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
      - serviceaccounts
      - services
      - secrets
      - pods
      - pods/exec
      - endpoints
    verbs:
      - create
      - get
      - list
      - watch
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - get
      - list
      - watch
      - update
      - patch
      - delete
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - roles
      - rolebindings
    verbs:
      - create
      - get
      - list
      - watch
      - update
      - patch
      - delete
  - apiGroups:
      - scheduling.k8s.io
    resources:
      - priorityclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - get
      - list
      - watch
      - update
      - patch
      - delete
  - apiGroups:
      - kubeflow.org
    resources:
      - mpijobs
      - mpijobs/status
      - mpijobs/finalizers
    verbs:
      - create
      - get
      - list
      - watch
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mpi-operator
  labels:
    app.kubernetes.io/name: mpi-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mpi-operator
subjects:
  - kind: ServiceAccount
    name: mpi-operator
    namespace: mpi-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mpi-operator
  namespace: mpi-operator
  labels:
    app: mpi-operator
    app.kubernetes.io/name: mpi-operator
    app.kubernetes.io/component: mpijob-controller
    kubeflow.org/mpi-operator-version: v0.8.2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mpi-operator
  template:
    metadata:
      labels:
        app: mpi-operator
        app.kubernetes.io/name: mpi-operator
    spec:
      serviceAccountName: mpi-operator
      containers:
        - name: mpi-operator
          image: mpioperator/mpi-operator:0.8.2
          imagePullPolicy: IfNotPresent
          args:
            - -alsologtostderr
            - --lock-namespace
            - mpi-operator
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
