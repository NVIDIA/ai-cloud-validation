# my-isv High-Speed Storage (HSS) Validation Configuration - Living Example
#
# Imports validations from the provider-agnostic HSS template and wires the
# commands to the generic template scripts in scripts/storage/*. Those stubs
# ship with dummy-success values so this example runs end-to-end without any
# real high-speed storage infrastructure.
#
# Coverage (SDS Controller + Parallel File System Services):
#   HssStorageProvisioningCheck (HSS01-01), HssQosThroughputCheck (HSS02-01),
#   HssNonDisruptiveUpgradeCheck (HSS05-01), HssRdmaMemoryProtectionCheck (HSS06-01),
#   HssParallelFsProvisioningCheck (HSS07-01), HssMultipleFilesystemsCheck (HSS09-01),
#   HssLiveExpansionCheck (HSS10-01), HssQuotaEnforcementCheck (HSS12-01),
#   HssRootSquashCheck (HSS13-01), HssFlockMountCheck (HSS14-01),
#   HssChangelogAuditCheck (HSS15-01), HssMultipathCheck (HSS18-01).
#
# These checks ship unreleased; run with ISVTEST_INCLUDE_UNRELEASED=1 to
# exercise them end-to-end (otherwise the orchestrator skips them as no-ops).
#
# Usage:
#   uv run isvctl test run -f isvctl/configs/providers/my-isv/config/hss.yaml

import:
  - ../../../suites/hss.yaml

version: "1.0"

commands:
  storage:
    phases: ["test"]
    steps:
      - name: provision_storage
        phase: test
        command: "python ../scripts/storage/provision_storage_test.py"
        args: ["--region", "{{region}}", "--capacity-gib", "100"]
        timeout: 60

      - name: qos_throughput
        phase: test
        command: "python ../scripts/storage/qos_throughput_test.py"
        args: ["--region", "{{region}}", "--min-mbps", "1000", "--min-iops", "50000"]
        timeout: 60

      - name: non_disruptive_upgrade
        phase: test
        command: "python ../scripts/storage/non_disruptive_upgrade_test.py"
        args: ["--region", "{{region}}", "--min-defer-days", "14"]
        timeout: 60

      - name: rdma_memory_protection
        phase: test
        command: "python ../scripts/storage/rdma_memory_protection_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: provision_parallel_fs
        phase: test
        command: "python ../scripts/storage/provision_parallel_fs_test.py"
        args: ["--region", "{{region}}", "--fs-type", "parallel"]
        timeout: 60

      - name: multiple_filesystems
        phase: test
        command: "python ../scripts/storage/multiple_filesystems_test.py"
        args: ["--region", "{{region}}", "--count", "2", "--max-fs-tib", "50"]
        timeout: 60

      - name: live_expansion
        phase: test
        command: "python ../scripts/storage/live_expansion_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: quota_enforcement
        phase: test
        command: "python ../scripts/storage/quota_enforcement_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: root_squash
        phase: test
        command: "python ../scripts/storage/root_squash_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: flock_mount
        phase: test
        command: "python ../scripts/storage/flock_mount_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: changelog_audit
        phase: test
        command: "python ../scripts/storage/changelog_audit_test.py"
        args: ["--region", "{{region}}"]
        timeout: 60

      - name: multipath
        phase: test
        command: "python ../scripts/storage/multipath_test.py"
        args: ["--region", "{{region}}", "--servers", "3"]
        timeout: 60

tests:
  cluster_name: "my-isv-hss-validation"
  description: "my-isv high-speed storage validation (generic stubs, dummy overrides)"

  settings:
    region: "my-isv-region-1"
