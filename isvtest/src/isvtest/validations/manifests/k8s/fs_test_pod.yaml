# Parameterisable BusyBox filesystem-test pod for k8s_filesystem validations.
#
# Loaded by isvtest.core.k8s.render_k8s_manifest and mutated in-memory at
# runtime by _set_fs_pod_fields. The placeholder values below exist only to
# keep the file valid YAML; metadata.{name,namespace}, the container image,
# the container command, the persistentVolumeClaim.claimName and (optionally)
# spec.nodeName are overridden by the caller before apply. Unlike
# storage_mount_pod.yaml this pod accepts an arbitrary command (so the caller
# can hold a flock or sleep), a configurable image (default busybox:1.36, so
# air-gapped clusters can point at a mirror) and an optional nodeName so two
# pods can be pinned to distinct nodes for cross-node tests. It needs no extra
# privileges - flock/echo/stat/ls/mkdir all run as the unprivileged nobody
# user against the mounted PVC.
#
# The default keepalive command loops forever rather than `sleep N` so the pod
# never self-terminates mid-test (BusyBox `sleep` has no `infinity`); the
# harness deletes pods explicitly when done.
apiVersion: v1
kind: Pod
metadata:
  name: placeholder
  namespace: placeholder
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: probe
      image: placeholder
      command: ["sh", "-c", "while true; do sleep 3600; done"]
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: placeholder
